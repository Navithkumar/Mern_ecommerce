services:
    nginx:
        image: nginx:latest
        container_name: nginx_gateway
        ports:
            - '80:80'
        volumes:
            - ./gateway/nginx.conf:/etc/nginx/nginx.conf
        depends_on:
            - auth-service
            - product-service
            - order-service
            - payment-service
            - cart-service
            - notification-service
        networks:
            - app-network

    auth-service:
        build:
            context: ./services/auth-service
            dockerfile: ../../docker/node.Dockerfile
        container_name: auth-service
        volumes:
            - ./services/auth-service:/app
            - /app/node_modules
        ports:
            - '5001:5000'
        env_file:
            - .env
        depends_on:
            - mongo
            - redis
            - rabbitmq
        networks:
            - app-network

    product-service:
        build:
            context: ./services/product-service
            dockerfile: ../../docker/node.Dockerfile
        container_name: product-service
        volumes:
            - ./services/product-service:/app
            - /app/node_modules
        ports:
            - '5002:5000'
        env_file:
            - .env
        networks:
            - app-network

    order-service:
        build:
            context: ./services/order-service
            dockerfile: ../../docker/node.Dockerfile
        container_name: order-service
        volumes:
            - ./services/order-service:/app
            - /app/node_modules
        ports:
            - '5003:5000'
        env_file:
            - .env
        depends_on:
            - mongo
            - redis
            - rabbitmq
        networks:
            - app-network

    payment-service:
        build:
            context: ./services/payment-service
            dockerfile: ../../docker/node.Dockerfile
        container_name: payment-service
        volumes:
            - ./services/payment-service:/app
            - /app/node_modules
        ports:
            - '5004:5000'
        env_file:
            - .env
        depends_on:
            - mongo
            - redis
            - rabbitmq
        networks:
            - app-network

    cart-service:
        build:
            context: ./services/cart-service
            dockerfile: ../../docker/node.Dockerfile
        container_name: cart-service
        volumes:
            - ./services/cart-service:/app
            - /app/node_modules
        ports:
            - '5005:5000'
        env_file:
            - .env
        networks:
            - app-network

    notification-service:
        build:
            context: ./services/notification-service
            dockerfile: ../../docker/node.Dockerfile
        container_name: notification-service
        volumes:
            - ./services/notification-service:/app
            - /app/node_modules
        ports:
            - '5006:5000'
        env_file:
            - .env
        depends_on:
            - rabbitmq
        networks:
            - app-network

    mongo:
        image: mongo:7
        container_name: mongo
        ports:
            - '27017:27017'
        volumes:
            - mongo-data:/data/db
        networks:
            - app-network

    redis:
        image: redis:7
        container_name: redis
        ports:
            - '6379:6379'
        networks:
            - app-network

    rabbitmq:
        image: rabbitmq:3-management
        container_name: rabbitmq
        ports:
            - '5672:5672'
            - '15672:15672'
        networks:
            - app-network

networks:
    app-network:

volumes:
    mongo-data:
